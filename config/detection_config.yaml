# 检测模型配置
model:
  # 自定义训练权重
  weights: models/best.pt
  # 置信阈值：低于该分数的检测会被过滤
  confidence_threshold: 0.37
  # 非极大值抑制 IoU 阈值
  iou_threshold: 0.45
  # 单张图最大检测框数量
  max_detections: 100
  # YOLO 推理输入尺寸
  image_size: 640

# 类别索引映射（必须与训练时 names 顺序一致）
class_map:
  0: Crack
  1: Manhole
  2: Net
  3: Pothole
  4: Patch-Crack
  5: Patch-Net
  6: Patch-Pothole
  7: other
  8: Other

# 可选：启动时校验 class_map 与训练 data.yaml 是否一致
class_map_sync:
  data_yaml: D:/路面缺陷(路面裂缝、井盖、坑洼路面)数据集-YOLO项目格式/lumian
  mode: warn

# 严重程度阈值（基于 confidence）
severity:
  high: 0.75
  medium: 0.5

# 预处理配置
preprocessing:
  denoise: true
  edge_enhancement: true
  clahe: true

# 未传入 location 时的默认位置标签
default_location: 未知区域
